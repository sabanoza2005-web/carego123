<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareGo - პარამეტრები</title>
    <link rel="stylesheet" href="css/settings-patient.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <nav class="navbar">
        <a href="index.html">მთავარი</a>
        <a href="nurses.html">ექთნები</a>
        <a href="about.html">ჩვენს შესახებ</a>
        <a href="contact.html">კონტაქტი</a>
        <a href="profile-patient.html" class="active">პროფილი</a>
    </nav>

    <div class="settings-container">
        
        <div class="settings-header">
            <a href="profile-patient.html" class="back-arrow-btn" id="backBtn">
                <i class="fas fa-chevron-left"></i>
            </a>
            <h1>პარამეტრები</h1>
        </div>

        <div class="settings-options-list">
            
            <a href="support.html" class="setting-item">
                <div class="setting-left-block">
                    <i class="far fa-question-circle setting-icon"></i>
                    <span>მხარდაჭერა</span>
                </div>
                <i class="fas fa-chevron-right arrow-icon"></i>
            </a>

            <a href="security.html" class="setting-item">
                <div class="setting-left-block">
                    <i class="far fa-check-square setting-icon"></i>
                    <span>უსაფრთხოება</span>
                </div>
                <i class="fas fa-chevron-right arrow-icon"></i>
            </a>

            <a href="language.html" class="setting-item">
                <div class="setting-left-block">
                    <i class="fas fa-language setting-icon"></i>
                    <span>ენა</span>
                </div>
                <i class="fas fa-chevron-right arrow-icon"></i>
            </a>

            <a href="privacy.html" class="setting-item">
                <div class="setting-left-block">
                    <i class="fas fa-user-shield setting-icon"></i>
                    <span>კონფიდენციალურობა</span>
                </div>
                <i class="fas fa-chevron-right arrow-icon"></i>
            </a>

            <a href="history.html" class="setting-item">
                <div class="setting-left-block">
                    <i class="far fa-clock setting-icon"></i>
                    <span>ისტორია</span>
                </div>
                <i class="fas fa-chevron-right arrow-icon"></i>
            </a>

            <a href="terms.html" class="setting-item">
                <div class="setting-left-block">
                    <i class="far fa-file-alt setting-icon"></i>
                    <span>წესები და პირობები</span>
                </div>
                <i class="fas fa-chevron-right arrow-icon"></i>
            </a>

            <a href="logout.html" class="setting-item logout-item">
                <div class="setting-left-block">
                    <i class="fas fa-sign-out-alt setting-icon"></i>
                    <span>გასვლა</span>
                </div>
                <i class="fas fa-chevron-right arrow-icon"></i>
            </a>

        </div>
    </div>

    <script src="js/settings-patient.js"></script>
</body>
</html>
