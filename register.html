<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareGo - რეგისტრაცია</title>
    <link rel="stylesheet" href="css/register.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>

    <div class="top-banner"></div>

    <main class="role-selection-container">
        
        <h1 class="page-title">დარეგისტრირდი როგორც</h1>

        <div class="role-cards-grid">
            
            <div class="role-card" id="roleNurse" data-role="nurse">
                <div class="icon-wrapper">
                    <i class="fa-solid fa-user-nurse"></i>
                </div>
                <h3 class="role-name">ექთანი</h3>
            </div>

            <div class="role-card" id="rolePatient" data-role="patient">
                <div class="icon-wrapper">
                    <i class="fa-regular fa-user"></i>
                </div>
                <h3 class="role-name">მომხმარებელი</h3>
            </div>

        </div>

    </main>

    <script src="js/register.js"></script>
    <script src="js/auth-helper.js"></script>
</body>
</html>
