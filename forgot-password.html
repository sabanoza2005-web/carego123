<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareGo - პაროლის აღდგენა</title>
    <style>
        /* =========================================
           RESET & BASE STYLES
        ========================================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background-color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ზედა მუქი ლურჯი ბანერი (1728 x 150) */
        .top-banner {
            width: 100%;
            height: 150px;
            background-color: #000b58;
        }

        /* მთავარი კონტეინერი */
        .forgot-container {
            width: 100%;
            max-width: 1000px;
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        /* სათაური: "პაროლის აღდგენა" (360 x 44) */
        .page-title {
            width: 360px;
            height: 44px;
            font-size: 32px;
            font-weight: bold;
            color: #000000;
            margin-bottom: 20px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ქვესათაური / ინსტრუქცია (990 x 20) */
        .page-subtitle {
            width: 990px;
            height: 20px;
            font-size: 15px;
            color: #000000;
            margin-bottom: 40px;
            white-space: nowrap;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ფორმის სტრუქტურა */
        .forgot-form {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        /* ელ-ფოსტის ინფუთის კონტეინერი (530 x 78) */
        .input-group {
            width: 530px;
            height: 78px;
            margin-bottom: 5px; /* შემცირდა, რომ ვარნინგი ახლოს დაჯდეს */
        }

        .input-group input {
            width: 100%;
            height: 100%;
            padding: 0 25px;
            font-size: 16px;
            border: 1px solid #000000;
            border-radius: 40px;
            outline: none;
            color: #111111;
        }

        /* წითელი გაფრთხილების ტექსტის სტილი */
        .error-message {
            color: #ff0000;
            font-size: 14px;
            font-weight: bold;
            margin-top: 5px;
            margin-bottom: 20px;
            height: 20px;
            display: none; /* დეფოლტად დამალულია */
            width: 530px;
            text-align: left;
            padding-left: 25px;
        }

        /* შესვლის ლინკის გამოგზავნა ღილაკი (518 x 78) */
        .btn-submit {
            width: 518px;
            height: 78px;
            background-color: #000b58;
            color: #ffffff;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            margin-bottom: 25px;
            transition: background-color 0.2s ease;
        }

        .btn-submit:hover {
            background-color: #001399;
        }

        /* "ვერ შევდივარ" ტექსტი (135 x 25) */
        .trouble-text {
            width: 135px;
            height: 25px;
            font-size: 15px;
            color: #000000;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* გამყოფი სექცია: ხაზები და ტექსტი "ან" (150 x 1 ხაზები, 23 x 25 ტექსტი) */
        .divider-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            width: 346px;
            margin-bottom: 25px;
        }

        .divider-line {
            width: 150px;
            height: 1px;
            background-color: #000b58;
        }

        .divider-text {
            width: 23px;
            height: 25px;
            font-size: 16px;
            color: #000000;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* "შექმენით ახალი ანგარიში" ბმული (278 x 25) */
        .register-redirect {
            width: 278px;
            height: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .create-account-link {
            font-size: 16px;
            color: #000000;
            font-weight: bold;
            text-decoration: underline;
        }

        @media (max-width: 1024px) {
            .page-subtitle { width: 100%; white-space: normal; height: auto; }
            .input-group, .error-message { width: 100%; max-width: 530px; }
            .btn-submit { width: 100%; max-width: 518px; }
        }
    </style>
</head>
<body>

    <div class="top-banner"></div>

    <main class="forgot-container">
        <h1 class="page-title">პაროლის აღდგენა</h1>
        <p class="page-subtitle">შეიყვანეთ თქვენი ელ.ფოსტა ან ტელეფონის ნომერი რათა გამოგიგზავნოთ ბმული თქვენი ანგარიშის დასაბრუნებლად</p>

        <form id="forgotForm" class="forgot-form" novalidate>
            
            <div class="input-group">
                <input type="email" id="email" placeholder="ელ-ფოსტა" required>
            </div>

            <div id="errorText" class="error-message"></div>

            <button type="submit" class="btn btn-submit">შესვლის ლინკის გამოგზავნა</button>

            <div class="trouble-text">ვერ შევდივარ</div>

            <div class="divider-wrapper">
                <span class="divider-line"></span>
                <span class="divider-text">ან</span>
                <span class="divider-line"></span>
            </div>

            <div class="register-redirect">
                <a href="register.html" class="create-account-link">შექმენით ახალი ანგარიში</a>
            </div>
        </form>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const form = document.getElementById("forgotForm");
            const emailInput = document.getElementById("email");
            const errorText = document.getElementById("errorText");

            if (form) {
                form.addEventListener("submit", (e) => {
                    e.preventDefault();
                    const emailValue = emailInput.value.trim();

                    // ვასუფთავებთ წინა შეცდომას
                    errorText.style.display = "none";
                    errorText.innerText = "";

                    // ვალიდაცია
                    if (emailValue === "") {
                        errorText.innerText = "გთხოვთ შეიყვანოთ ელ-ფოსტა ან ტელეფონის ნომერი!";
                        errorText.style.display = "block";
                        return;
                    }

                    // თუ ყველაფერი სწორია, პირდაპირ გადავდივართ კოდის გვერდზე
                    window.location.href = "verify-code.html";
                });
            }
        });
    </script>
</body>
</html>
