<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareGo - პაროლის შეცვლა</title>
    <link rel="stylesheet" href="css/change-password.css">
</head>
<body>

    <div class="top-banner"></div>

    <main class="change-container">
        
        <h1 class="page-title">პაროლის აღდგენა</h1>
        
        <p class="page-subtitle">შეიყვანეთ თქვენი ელ.ფოსტა ან მობილური ნომერი</p>

        <form id="changePasswordForm" class="change-form" novalidate>
            
            <div class="input-group">
                <input type="text" id="identifier" placeholder="ელ-ფოსტა ან ტელეფონის ნომერი" required>
            </div>

            <div class="input-group">
                <input type="password" id="password" placeholder="პაროლი" required>
                <div id="togglePassword" class="toggle-password">
                    <svg class="eye-open" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    <svg class="eye-closed" style="display: none;" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
                </div>
            </div>

            <div class="input-group">
                <input type="password" id="confirmPassword" placeholder="გაიმეორეთ პაროლი" required>
                <div id="toggleConfirmPassword" class="toggle-password">
                    <svg class="eye-open" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    <svg class="eye-closed" style="display: none;" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
                </div>
            </div>

            <div id="errorText" class="error-message"></div>

            <button type="submit" class="btn-submit">შესვლა</button>

        </form>
    </main>

    <script src="js/change-password.js"></script>
    <script src="js/auth-helper.js"></script>
</body>
</html>
